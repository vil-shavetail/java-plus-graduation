server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
           enabled: true
      routes:
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/client/requests/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**, /client/users/**

        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/categories/**, /admin/**, /client/**, /users/**, /events/**, /compilations/**

        - id: stats-server
          uri: lb://stats-server
          predicates:
            - Path=/hit/**, /stats/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, mappings, gateway
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
      routes:
        enabled: true