server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
           enabled: true
      routes:
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**, /client/users/**

        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/users/{userId}/events/{eventId}/requests/**, /categories/**, /admin/**, /events/**, /compilations/**, /users/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, mappings, gateway
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
      routes:
        enabled: true