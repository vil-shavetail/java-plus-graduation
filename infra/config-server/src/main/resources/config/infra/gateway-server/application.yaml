spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery.locator.enabled: true
      routes:
        - id: main-service
          uri: lb://main-service
          predicates:
            - Path=/**

        - id: stats-server
          uri: lb://stats-server
          predicates:
            - Path=/**

server:
  port: 8080