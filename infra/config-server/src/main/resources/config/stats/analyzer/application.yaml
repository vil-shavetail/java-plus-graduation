server:
  port: 0

grpc:
  server:
    port: 0

spring:
  application:
    name: analyzer

  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/analyzer-db
    username: postgres
    password: '12345'
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: "stats.analyzer.consumer"
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.practicum.ActionTypeDeserializer

analyzer:
  kafka:
    consumer:
      topic:
        actions: "stats.user-actions.v1"
        events: "stats.events-similarity.v1"

logging:
  level:
    ru:
      practicum: TRACE
    org:
      springframework: ERROR
      apache.kafka: ERROR
      springframework.orm.jpa: INFO
      springframework.transaction: INFO
      springframework.transaction.interceptor: TRACE
      springframework.orm.jpa.JpaTransactionManager: DEBUG